<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detector | Dark Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="dashboard-container">
        <header>
            <div class="header-content">
                <h1>🔍 Fake News Detector</h1>
                <p>Advanced Machine Learning Analysis</p>
            </div>
        </header>

        <main class="dashboard-grid">
            <div class="panel input-panel">
                <form id="prediction_form">
                    <div class="input_group">
                        <label for="news_title">Article Title</label>
                        <input type="text" id="news_title" name="title" placeholder="Enter the headline..." required>
                    </div>

                    <div class="input_group flex-grow">
                        <label for="news_text">Article Content</label>
                        <textarea id="news_text" name="text" placeholder="Paste the full article text here..." required></textarea>
                    </div>

                    <button type="submit" id="submit_btn">
                        <span id="btn_text">Analyze Article</span>
                        <div id="loader" class="hidden"></div>
                    </button>
                </form>
            </div>

            <div class="panel results-panel">
                <div id="empty_state" class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <p>Awaiting article input...</p>
                </div>

                <div id="result_section" class="hidden">
                    <div class="result-header">
                        <h2 id="final_label"></h2>
                    </div>
                    
                    <div class="confidence_wrapper">
                        <div class="confidence-header">
                            <span>Model Confidence</span>
                            <span id="confidence_text"></span>
                        </div>
                        <div class="confidence_bar_container">
                            <div id="confidence_fill" class="confidence_fill"></div>
                        </div>
                    </div>
                    
                    <div class="prob_details">
                        <div class="prob_box">
                            <span class="prob_label">Real Probability</span>
                            <span id="real_prob_val" class="prob_val">0%</span>
                        </div>
                        <div class="prob_box">
                            <span class="prob_label">Fake Probability</span>
                            <span id="fake_prob_val" class="prob_val">0%</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('prediction_form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btnText = document.getElementById('btn_text');
            const loader = document.getElementById('loader');
            const resultSection = document.getElementById('result_section');
            const emptyState = document.getElementById('empty_state');
            const submitBtn = document.getElementById('submit_btn');

            btnText.classList.add('hidden');
            loader.classList.remove('hidden');
            submitBtn.disabled = true;
            resultSection.classList.add('hidden');
            emptyState.classList.add('hidden'); // Hide the waiting icon

            const formData = new FormData(this);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.error) {
                    alert(data.error);
                    emptyState.classList.remove('hidden');
                } else {
                    const labelEl = document.getElementById('final_label');
                    labelEl.textContent = `${data.label} NEWS`;
                    
                    if (data.label === 'FAKE') {
                        labelEl.style.color = '#f87171';
                        document.getElementById('confidence_fill').style.backgroundColor = '#f87171';
                    } else {
                        labelEl.style.color = '#34d399';
                        document.getElementById('confidence_fill').style.backgroundColor = '#34d399';
                    }

                    document.getElementById('confidence_fill').style.width = `${data.confidence}%`;
                    document.getElementById('confidence_text').textContent = `${data.confidence}%`;
                    
                    document.getElementById('real_prob_val').textContent = `${data.real_prob}%`;
                    document.getElementById('fake_prob_val').textContent = `${data.fake_prob}%`;

                    resultSection.classList.remove('hidden');
                }
            } catch (error) {
                alert('An error occurred.');
                emptyState.classList.remove('hidden');
            } finally {
                btnText.classList.remove('hidden');
                loader.classList.add('hidden');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
